services:
  app:
    image: jekyll/jekyll:pages
    command: >-
      sh -c '
        apk add --no-cache build-base ruby-dev linux-headers;
        /usr/local/bin/bundle install;
        /usr/local/bin/bundle exec jekyll serve --force_polling --host 0.0.0.0;
      '
    volumes:
      - $PWD:/srv/jekyll
    ports:
      - 4000:4000
